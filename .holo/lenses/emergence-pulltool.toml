[hololens]
container = "ghcr.io/hologit/lenses/sencha-app:latest"

[hololens.sencha]
app = "EmergencePullTool"

[hololens.input]
root = "sencha-workspace"
files = [
    "workspace.json",
    "ext/**",
    "packages/**",
    "EmergencePullTool/**",
]

[hololens.output]
root = "webapp-builds/EmergencePullTool"
merge = "replace"
